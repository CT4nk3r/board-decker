name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

# tauri-action needs write access to create the GitHub Release and upload assets.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (universal)
            platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - label: Linux (x86_64)
            platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - label: Windows (x86_64)
            platform: windows-latest
            args: ""
            rust-targets: ""
          - label: Linux (ARM64)
            platform: ubuntu-22.04-arm
            args: ""
            rust-targets: ""
          - label: Windows (ARM64)
            platform: windows-11-arm
            # Limit to NSIS — WiX/MSI is unreliable for arm64.
            args: --bundles nsis
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional code-signing secrets — add them to the repo to sign builds:
          #   macOS:   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          #            APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          #   Windows: configure a signing command in tauri.conf.json
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Deck ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform from the assets below."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
