name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build frontend
        run: npm run build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 7

  tauri:
    name: Build ${{ matrix.label }}
    # Skip the expensive native build matrix if the frontend doesn't compile.
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (universal)
            platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - label: Linux (x86_64)
            platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - label: Windows (x86_64)
            platform: windows-latest
            args: ""
            rust-targets: ""
          - label: Linux (ARM64)
            platform: ubuntu-22.04-arm
            args: ""
            rust-targets: ""
          - label: Windows (ARM64)
            platform: windows-11-arm
            # Limit to NSIS — WiX/MSI is unreliable for arm64.
            args: --bundles nsis
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: deck-${{ matrix.platform }}
          # Default host target lands in target/release; an explicit --target
          # (macOS universal) lands in target/<triple>/release.
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**
          if-no-files-found: error
          retention-days: 7
